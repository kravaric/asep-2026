  const m={0:'h0',1:'h1',3:'h3',4:'h4',8:'h8',9:'h9',6:'h6',7:'h7'};
  const el=document.getElementById(m[col]);if(el)el.className=sd===1?'sa':'sd';
  as();page=1;render();
}

function us(){
  const tot=filtered.reduce((s,r)=>s+(r[F.TH]||0),0);
  document.getElementById('s-th').textContent=tot.toLocaleString('el-GR');
  document.getElementById('s-eg').textContent=filtered.length.toLocaleString('el-GR');
  document.getElementById('s-fo').textContent=new Set(filtered.map(r=>r[F.FO])).size;
  document.getElementById('s-pe').textContent=new Set(filtered.map(r=>r[F.NO])).size;
}

function render(){
  const slice=filtered.slice((page-1)*PS,page*PS);
  const none=filtered.length===0;
  if(isMobile()){
    document.getElementById('mc-no').style.display=none?'block':'none';
    const mc=document.getElementById('mc');
    if(none){mc.innerHTML='';renderPg();return;}
    mc.innerHTML=slice.map(r=>{
      const isI=r[F.KF].includes('ΙΔΑΧ');
      const eb=r[F.EN]==='06'?'<span class="badge b06">06</span>':r[F.EN]==='07'?'<span class="badge b07">07</span>':'';
      const eid=r[F.KF].replace(r[F.KM],'').replace(/^[\s\.]*ΕΙΔ\.?\s*/,'').replace('(ΙΔΑΧ)*','').trim();
      return '<div class="card">'+
        '<div class="card-header"><span class="card-kod">'+r[F.K]+'</span><span class="card-theseis">'+r[F.TH]+' θέσ.</span></div>'+
        '<div class="card-klados">'+r[F.KM]+'</div>'+
        (eid?'<div class="card-eid">'+eid+(isI?' <span class="badge bidax">ΙΔΑΧ</span>':'')+'</div>':'')+
        '<div class="card-row"><span class="card-icon">&#127963;</span><span class="card-text">'+r[F.FO]+'</span></div>'+
        '<div class="card-row"><span class="card-icon">&#128205;</span><span class="card-text">'+r[F.ED]+(eb?' '+eb:'')+'</span></div>'+
        (r[F.TI]?'<div class="card-titloi">&#127891; Τίτλοι: '+r[F.TI]+(r[F.PR]?' &nbsp;|&nbsp; Προσόντα: '+r[F.PR]:'')+'</div>':'')+
        '</div>';
    }).join('');
  } else {
    document.getElementById('dt-no').style.display=none?'block':'none';
    const tb=document.getElementById('dt-body');
    if(none){tb.innerHTML='';renderPg();return;}
    tb.innerHTML=slice.map(r=>{
      const isI=r[F.KF].includes('ΙΔΑΧ');
      const eb=r[F.EN]==='06'?'<span class="badge b06">06</span>':r[F.EN]==='07'?'<span class="badge b07">07</span>':'—';
      const eid=r[F.KF].replace(r[F.KM],'').replace(/^[\s\.]*ΕΙΔ\.?\s*/,'').trim();
      return '<tr>'+
        '<td style="font-weight:700;color:#2d5a8e;white-space:nowrap">'+r[F.K]+'</td>'+
        '<td><span style="font-weight:600;font-size:0.8rem">'+r[F.KM]+'</span><br><small style="color:#888;font-size:0.72rem">'+eid+(isI?' <span class="badge bidax">ΙΔΑΧ</span>':'')+'</small></td>'+
        '<td style="font-size:0.78rem;max-width:180px">'+r[F.FO]+'</td>'+
        '<td style="font-size:0.78rem;max-width:140px">'+r[F.ED]+'</td>'+
        '<td><span class="col-titloi">'+r[F.TI]+'</span></td>'+
        '<td style="font-size:0.75rem;color:#555;max-width:120px">'+r[F.PR]+'</td>'+
        '<td style="text-align:center">'+eb+'</td>'+
        '<td style="text-align:center;font-weight:700;color:'+(r[F.TH]>1?'#b45309':'#1a1a2e')+'">'+r[F.TH]+'</td>'+
        '</tr>';
    }).join('');
  }
  renderPg();
}

function renderPg(){
  const total=filtered.length,pages=Math.ceil(total/PS);
  const s=(page-1)*PS+1,e=Math.min(page*PS,total);
  document.getElementById('pg-i').textContent=s+'–'+e+' / '+total.toLocaleString('el-GR');
  document.getElementById('pg-p').disabled=page<=1;
  document.getElementById('pg-n').disabled=page>=pages;
  const range=[];
  for(let i=1;i<=pages;i++){if(i===1||i===pages||Math.abs(i-page)<=1)range.push(i);else if(range[range.length-1]!=='…')range.push('…');}
  document.getElementById('pg-pgs').innerHTML=range.map(r=>r==='…'?'<span style="padding:0 0.25rem;color:#888">…</span>':'<button class="pg-btn'+(r===page?' active':'')+'" onclick="gp('+r+')">'+r+'</button>').join('');
}

function gp(p){page=p;render();window.scrollTo(0,0);}
function cp(d){gp(Math.max(1,Math.min(Math.ceil(filtered.length/PS),page+d)));}

function resetFilters(){
  document.getElementById('search').value='';
  ['f-klados','f-nomos','f-foreas','f-titlos','f-entop','f-idax'].forEach(id=>document.getElementById(id).value='');
  af();
}

function exportCSV(){
  const h=['Κωδ.','Κλάδος','Ειδικότητα','Φορέας','Έδρα','Νομός','Αποδ.Τίτλοι','Πρόσθετα Προσόντα','Εντοπιότητα','Θέσεις'];
  const rows=filtered.map(r=>[r[F.K],r[F.KM],r[F.KF],r[F.FO],r[F.ED],r[F.NO],r[F.TI],r[F.PR],r[F.EN],r[F.TH]].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='ASEP_2GB_2026.csv';a.click();
}

function db(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
window.addEventListener('resize',()=>render());
init();
</script>
